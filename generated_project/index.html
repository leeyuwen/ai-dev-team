<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="简洁高效的在线计算器 - 支持基础四则运算">
    <title>计算器</title>
    <!-- 引入 BigNumber.js 用于高精度计算 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bignumber.js/9.1.2/bignumber.min.js"></script>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <!-- 显示区域 -->
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>

        <!-- 功能按钮行 -->
        <div class="button-row">
            <button class="btn function" data-action="clear-all" title="全清">AC</button>
            <button class="btn function" data-action="toggle-sign" title="正负号">±</button>
            <button class="btn function" data-action="percentage" title="百分比">%</button>
            <button class="btn operator" data-action="operator" data-value="÷" title="除法">÷</button>
        </div>

        <!-- 数字按钮行 7-9 -->
        <div class="button-row">
            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-action="operator" data-value="×" title="乘法">×</button>
        </div>

        <!-- 数字按钮行 4-6 -->
        <div class="button-row">
            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-action="operator" data-value="−" title="减法">−</button>
        </div>

        <!-- 数字按钮行 1-3 -->
        <div class="button-row">
            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-action="operator" data-value="+" title="加法">+</button>
        </div>

        <!-- 底部按钮行 0 -->
        <div class="button-row">
            <button class="btn number zero" data-value="0">0</button>
            <button class="btn number" data-action="decimal" data-value="." title="小数点">.</button>
            <button class="btn operator" data-action="calculate" title="等于">=</button>
        </div>

        <!-- 辅助功能 -->
        <div class="button-row secondary">
            <button class="btn function small" data-action="backspace" title="退格">
                <i class="fas fa-backspace"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
